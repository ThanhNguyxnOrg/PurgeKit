name: Release Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          tagName: v__VERSION__
          releaseName: "PurgeKit v__VERSION__"
          releaseBody: |
            ### PurgeKit v1.0.0 - Stable Release for Windows 🎉
            
            This is the first stable release of PurgeKit for Windows, providing power users and developers with trace-free system cleaning and software removal.
            
            #### 🛠️ Key Features Included:
            * **WSL2 Disk Shrinker**: Safely compact WSL2 virtual drive files (`ext4.vhdx`) using Windows DiskPart with live logs and toggle dynamic auto-shrink (Sparse mode).
            * **Toolchain Version Sweeper**: Scan and clean unused versions of Rustup compiler toolchains and Node runtimes (NVM / FNM) with active protection locks.
            * **Universal Project Sweeper**: Traverses workspace directories to calculate sizes and batch sweep heavy directories (`node_modules`, `target`, `venv`, `.vs`...).
            * **Bulk Silent Uninstaller**: Select multiple desktop/Store apps, run uninstallation silently, and deep clean registry/disk remnants.
            * **PATH Cleaner**: Scans and sanitizes Windows environment variables to remove broken or duplicate entries.
            
            #### 📱 UI Improvements:
            * Complete responsive flex layout updates to ensure full windowed multitasking usability.
          releaseDraft: true
          prerelease: false
          includeDebug: false
          includeRelease: true
          includeUpdaterJson: false
