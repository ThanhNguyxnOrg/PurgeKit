name: Release Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Get Changelog Entry
        id: get_changelog
        shell: pwsh
        run: |
          # Get version from tag name (e.g., v1.0.0 -> 1.0.0)
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          Write-Host "Extracting changelog for version $version from tag $tag"
          
          if (Test-Path "CHANGELOG.md") {
              $changelog = Get-Content CHANGELOG.md -Raw
              # Regex to match the section under ## [version]
              $pattern = "(?s)## \[" + [regex]::Escape($version) + "\].*?\r?\n(.*?)(?=\r?\n## \[|\Z)"
              if ($changelog -match $pattern) {
                  $body = $Matches[1].Trim()
                  Write-Host "Found changelog entry:"
                  Write-Host $body
              } else {
                  $body = "Release version $version"
                  Write-Host "Changelog entry for $version not found. Using default."
              }
          } else {
              $body = "Release version $version"
              Write-Host "CHANGELOG.md not found. Using default."
          }
          
          # Write to GITHUB_OUTPUT using multiline syntax
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value "EOF"

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          tagName: v__VERSION__
          releaseName: "PurgeKit v__VERSION__"
          releaseBody: ${{ steps.get_changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          includeDebug: false
          includeRelease: true
          includeUpdaterJson: false
