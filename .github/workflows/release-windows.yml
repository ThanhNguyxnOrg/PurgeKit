name: Release Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check Commit Message or Manual Trigger
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
            echo "Manual trigger. Extracted version from tauri.conf.json: $VERSION"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            echo "Commit message: $COMMIT_MSG"
            if [[ "$COMMIT_MSG" =~ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              VERSION="${BASH_REMATCH[1]}"
              echo "Release trigger detected. Version: $VERSION"
              echo "is_release=true" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            else
              echo "No version tag match found in commit message. Skipping release build."
              echo "is_release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  release-windows:
    needs: check-trigger
    if: needs.check-trigger.outputs.is_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
         run: npm ci

      - name: Get Changelog Entry
        id: get_changelog
        shell: pwsh
        run: |
          $version = "${{ needs.check-trigger.outputs.version }}"
          Write-Host "Extracting changelog for version $version"
          
          if (Test-Path "CHANGELOG.md") {
              $changelog = Get-Content CHANGELOG.md -Raw
              # Regex to match the section under ## [version]
              $pattern = "(?s)## \[" + [regex]::Escape($version) + "\].*?\r?\n(.*?)(?=\r?\n## \[|\Z)"
              if ($changelog -match $pattern) {
                  $body = $Matches[1].Trim()
                  Write-Host "Found changelog entry:"
                  Write-Host $body
              } else {
                  $body = "Release version $version"
                  Write-Host "Changelog entry for $version not found. Using default."
              }
          } else {
              $body = "Release version $version"
              Write-Host "CHANGELOG.md not found. Using default."
          }
          
          # Write to GITHUB_OUTPUT using multiline syntax
          Add-Content -Path $env:GITHUB_OUTPUT -Value "body<<EOF"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $body
          Add-Content -Path $env:GITHUB_OUTPUT -Value "EOF"

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          tagName: v${{ needs.check-trigger.outputs.version }}
          releaseName: "PurgeKit v${{ needs.check-trigger.outputs.version }}"
          releaseBody: ${{ steps.get_changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          includeDebug: false
          includeRelease: true
          includeUpdaterJson: false
