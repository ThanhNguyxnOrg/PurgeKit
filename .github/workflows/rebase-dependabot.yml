name: Dependabot Auto-Rebase

on:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Rebase open Dependabot PRs
        run: |
          prs=$(gh pr list --state open --author "dependabot[bot]" --json number --jq '.[].number')
          for pr in $prs; do
            echo "Requesting rebase for PR #$pr"
            gh pr comment "$pr" --body "@dependabot rebase"
          done
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
